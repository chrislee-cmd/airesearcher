# pnpm 10+ refuses to silently skip postinstall scripts and exits 1 from
# every `pnpm exec` call (including the husky pre-commit chain) when an
# unapproved build script is detected. CI uses pnpm 9 (.github/workflows/ci.yml)
# which doesn't hit this, but local worker worktrees on pnpm 10/11 are
# blocked at commit time until each package is explicitly approved.
#
# This file pre-approves the build scripts we actually rely on, restoring
# the pnpm 9 behavior for new workers without manual `pnpm approve-builds`.
# Keep the list narrow — new entries should be a deliberate review decision.
#
# `packages: ['.']` is required so pnpm 9 (used by CI) accepts the file at
# all — pnpm 9 treats pnpm-workspace.yaml strictly as a workspace config
# and errors with "packages field missing or empty" otherwise. The root
# acts as a single-package workspace, which is a no-op for the existing
# layout. pnpm 10/11 reads `allowBuilds:` regardless.
packages:
  - '.'
allowBuilds:
  '@ffmpeg-installer/darwin-arm64': true
  '@parcel/watcher': true
  # @sentry/cli ships the binary used for source-map upload; PR-SEC12
  # only wires Sentry.init + beforeSend, not source maps, so we skip the
  # postinstall download. Flip to `true` when adopting `withSentryConfig`
  # or running `sentry-cli sourcemaps upload` in CI.
  '@sentry/cli': false
  '@swc/core': true
  sharp: true
  supabase: true
  unrs-resolver: true
# Security overrides (PR-SEC18 — 2026-06-26). Transitive deps with HIGH/MODERATE
# CVE that don't have a direct top-level bump available. Pinned to the lowest
# patched range so npm/snyk audit reports go to 0 high. Re-evaluate when
# upstream parents (next, @openai/agents, eslint, @supabase/realtime-js) ship
# updates that drop the old transitive dep naturally.
overrides:
  ws@>=8.0.0 <8.21.0: ^8.21.0
  hono@<4.12.25: ^4.12.25
  postcss@<8.5.10: ^8.5.10
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  uuid@<11.1.1: ^11.1.1
