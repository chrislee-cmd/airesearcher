name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Block PRs that introduce a new supabase/migrations/*.sql with a
      # non-timestamp prefix. The same script is wired into pre-commit; this
      # CI step catches commits made with --no-verify (PROJECT.md §3.8 / §7.9).
      - name: Migration naming check
        run: bash scripts/check-migration-naming.sh

      # Design-system rules are hard-flipped: any violation of
      # `no-restricted-syntax` (radius / z-index / text-[Npx] hardcoded
      # tokens) or `react/forbid-elements` (native button/input/textarea
      # outside primitives) blocks merge. Baseline is 0 on main as of
      # B-1 step 9 (PR #326). The rest of lint stays soft below — the
      # ~23 react-hooks/set-state-in-effect errors are tracked separately.
      - name: Design-system lint (blocking)
        run: |
          set -e
          pnpm exec eslint . --format=json > /tmp/lint.json || true
          DS_COUNT=$(jq '[.[] | .messages[] | select(.ruleId == "no-restricted-syntax" or .ruleId == "react/forbid-elements")] | length' /tmp/lint.json)
          if [ "$DS_COUNT" -gt 0 ]; then
            echo "::error::Design-system rule violations ($DS_COUNT):"
            jq -r '.[] | select(.messages | any(.ruleId == "no-restricted-syntax" or .ruleId == "react/forbid-elements")) | "\n📁 \(.filePath)" + ([.messages[] | select(.ruleId == "no-restricted-syntax" or .ruleId == "react/forbid-elements") | "\n  Line \(.line): [\(.ruleId)] \(.message)"] | join(""))' /tmp/lint.json
            exit 1
          fi
          echo "✓ No design-system rule violations"

      # Full lint is hard-flipped (PR #335). Baseline 0 errors on main
      # after PR #334 suppressed 23 intentional set-state-in-effect sites
      # with reasoned `eslint-disable-next-line`. New violations now block
      # merge. Add per-line disables with reasons for legit patterns.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # i18n locale key parity (i18n Phase 2). Hard gate: ko↔en must match
      # exactly, ja/th must be a subset of en, and every messages/*.json must
      # be valid JSON with no duplicate keys. Prevents raw-key regressions —
      # the en-base merge in src/i18n/request.ts relies on ja/th ⊆ en.
      - name: i18n locale parity
        run: pnpm check:i18n

      # 한글 리터럴 ratchet 가드 — docs/WRITING.md 불변식 ①("디폴트 뷰 한글
      # 노출 금지")의 CI 강제. 유저-facing 소스의 하드코딩 한글은 /en 뷰에도
      # 노출되므로 근본 원인. .i18n-korean-baseline.json 대비 파일별 카운트가
      # 초과하면 red(신규 유입 차단). 스윕 PR 은 baseline 을 단조 감소시킨다.
      - name: Korean literal guard (ratchet)
        run: pnpm check:korean

      # 디자인 토큰 하드코드 ratchet 가드 — PROJECT.md §9 디자인 시스템 불변식
      # ("색/그림자/라디우스는 토큰만 사용")의 정적 CI 강제. 토큰 대상 속성의
      # 하드코드(arbitrary shadow-[…]·인라인 hex·rounded-[Npx]·SVG fill)를
      # .design-hardcode-baseline.json 대비 파일별 카운트로 비교, 초과하면 red
      # (신규 유입 차단). burn-down PR 은 baseline 을 단조 감소시킨다. check:korean
      # 의 형제 — 과탐 방지 위해 색/shadow/radius/font/border 만 엄격.
      - name: Design hardcode guard (ratchet)
        run: pnpm check:design

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans full commit history

      - name: Install gitleaks
        run: |
          set -e
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks detect --redact --verbose --no-banner

  dep-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Soft-launched: main currently has 9 high CVEs (mostly next@16.2.4 → patched
      # 16.2.5). Dependabot will auto-PR the patches; once cleaned, drop
      # continue-on-error and add 'Dependency audit' to branch protection contexts.
      - name: Audit (non-blocking)
        continue-on-error: true
        run: pnpm audit --audit-level=high --prod
