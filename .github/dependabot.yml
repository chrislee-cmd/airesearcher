version: 2
updates:
  # npm dependencies (production + dev)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      supabase:
        patterns:
          - "@supabase/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - tailwind-merge
      eslint:
        patterns:
          - eslint
          - "eslint-*"
          - "@typescript-eslint/*"
      ai-sdk:
        patterns:
          - ai
          - "@ai-sdk/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
