name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Block PRs that introduce a new supabase/migrations/*.sql with a
      # non-timestamp prefix. The same script is wired into pre-commit; this
      # CI step catches commits made with --no-verify (PROJECT.md §3.8 / §7.9).
      - name: Migration naming check
        run: bash scripts/check-migration-naming.sh

      # Lint is soft-launched: existing main has 108 pre-existing errors
      # (mostly react/no-unescaped-entities). We surface failures in PR logs
      # but do not block merges yet. Tighten to required after cleanup PRs.
      - name: Lint (non-blocking)
        continue-on-error: true
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans full commit history

      - name: Install gitleaks
        run: |
          set -e
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks detect --redact --verbose --no-banner

  dep-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Soft-launched: main currently has 9 high CVEs (mostly next@16.2.4 → patched
      # 16.2.5). Dependabot will auto-PR the patches; once cleaned, drop
      # continue-on-error and add 'Dependency audit' to branch protection contexts.
      - name: Audit (non-blocking)
        continue-on-error: true
        run: pnpm audit --audit-level=high --prod
