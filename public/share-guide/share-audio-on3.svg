<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="화면 공유 창에서 창 탭을 고르고 시스템 오디오도 공유 토글을 켜는 안내">
  <!-- 제품 스크린샷 대체용 일러스트 (프로토 share-audio-on3.png 대조).
       브라우저 화면 공유 picker 를 도식화 — 프로토 주석 3요소를 그대로 담는다:
         ① '창' 탭 초록 박스 강조 (브라우저 창 공유 유도)
         ② 썸네일 목록 블러 (주목 분산 방지)
         ③ '시스템 오디오도 공유' 토글 ON + 초록 콜아웃 (참석자 음성 결정 요소) -->
  <defs>
    <!-- ② 썸네일 목록 블러 필터 -->
    <filter id="thumbBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="#fbf8f3"/>
  <rect x="0.5" y="0.5" width="639" height="399" fill="none" stroke="#1d1b20" stroke-width="1"/>

  <!-- 공유 picker 다이얼로그 -->
  <rect x="64" y="24" width="512" height="316" rx="12" fill="#ffffff" stroke="#1d1b20" stroke-width="2"/>
  <text x="88" y="60" font-family="sans-serif" font-size="17" font-weight="700" fill="#1d1b20">공유할 대상 선택</text>
  <line x1="64" y1="76" x2="576" y2="76" stroke="#1d1b20" stroke-width="1" opacity="0.15"/>

  <!-- 탭 행: 전체 화면 · 창(강조) · Chrome 탭 -->
  <rect x="88" y="90" width="116" height="34" rx="8" fill="#ffffff" stroke="#1d1b20" stroke-width="1.2"/>
  <text x="106" y="112" font-family="sans-serif" font-size="14" fill="#5b5965">전체 화면</text>

  <!-- ① '창' 탭 초록 박스 강조 -->
  <rect x="212" y="88" width="80" height="38" rx="8" fill="#e7f6ec" stroke="#16a34a" stroke-width="2.5"/>
  <text x="234" y="112" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d1b20">창</text>

  <rect x="300" y="90" width="116" height="34" rx="8" fill="#ffffff" stroke="#1d1b20" stroke-width="1.2"/>
  <text x="318" y="112" font-family="sans-serif" font-size="14" fill="#5b5965">Chrome 탭</text>

  <!-- '창' 탭으로 향하는 초록 강조 화살표 -->
  <path d="M252 138 L252 130" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <path d="M246 133 L252 127 L258 133" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ② 썸네일 목록 (블러 처리 — 주목 분산 방지) -->
  <g filter="url(#thumbBlur)" opacity="0.85">
    <rect x="88" y="150" width="140" height="90" rx="6" fill="#e9e3d8" stroke="#c9c1b3" stroke-width="1"/>
    <rect x="104" y="166" width="108" height="42" rx="3" fill="#cfe6ff"/>
    <rect x="104" y="216" width="72" height="10" rx="3" fill="#c9c1b3"/>

    <rect x="244" y="150" width="140" height="90" rx="6" fill="#e9e3d8" stroke="#c9c1b3" stroke-width="1"/>
    <rect x="260" y="166" width="108" height="42" rx="3" fill="#e7defe"/>
    <rect x="260" y="216" width="72" height="10" rx="3" fill="#c9c1b3"/>

    <rect x="400" y="150" width="140" height="90" rx="6" fill="#e9e3d8" stroke="#c9c1b3" stroke-width="1"/>
    <rect x="416" y="166" width="108" height="42" rx="3" fill="#ffe0c7"/>
    <rect x="416" y="216" width="72" height="10" rx="3" fill="#c9c1b3"/>
  </g>

  <!-- ③ 좌측 하단 '시스템 오디오도 공유' 토글 ON + 초록 콜아웃 -->
  <rect x="88" y="262" width="300" height="56" rx="10" fill="#e7f6ec" stroke="#16a34a" stroke-width="2.5"/>
  <text x="108" y="296" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d1b20">시스템 오디오도 공유</text>
  <!-- 토글 스위치 ON -->
  <rect x="326" y="280" width="46" height="24" rx="12" fill="#16a34a"/>
  <circle cx="360" cy="292" r="9" fill="#ffffff"/>
  <!-- 콜아웃 화살표 -->
  <path d="M52 290 L84 290" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <path d="M76 284 L84 290 L76 296" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 확인 버튼 -->
  <rect x="452" y="274" width="96" height="34" rx="8" fill="#1d1b20"/>
  <text x="474" y="296" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">공유</text>

  <!-- 하단 경고 라인 -->
  <text x="64" y="368" font-family="sans-serif" font-size="14" font-weight="700" fill="#c2334f">🔊 시스템 오디오 ON</text>
  <text x="252" y="368" font-family="sans-serif" font-size="13" fill="#5b5965">— 끄면 참석자 음성이 저장되지 않아요</text>
</svg>
